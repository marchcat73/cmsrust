{% extends "base.html" %} {% block title %}Вход в систему | CMS Rust{% endblock
title %} {% block content %} {% block styles %}
<link
	rel="stylesheet"
	href="/static/themes/{{ current_theme }}/style.css" />
<link
	rel="stylesheet"
	href="/static/themes/{{ current_theme }}/login.css" />
{% endblock styles %}
<div class="auth-container">
	<div class="auth-card">
		<h2>Вход</h2>

		<div
			id="error-message"
			class="alert alert-error"
			style="display: none"></div>

		<form id="login-form">
			<div class="form-group">
				<label for="email">Email</label>
				<input
					type="email"
					id="email"
					name="email"
					required
					placeholder="admin@example.com" />
			</div>

			<div class="form-group">
				<label for="password">Пароль</label>
				<input
					type="password"
					id="password"
					name="password"
					required
					placeholder="••••••••" />
			</div>

			<button
				type="submit"
				class="btn btn-primary">
				Войти
			</button>
		</form>

		<p class="auth-footer">
			Нет аккаунта? <a href="/register">Зарегистрироваться</a>
		</p>
	</div>
</div>

<script>
	document
		.getElementById("login-form")
		.addEventListener("submit", async function (e) {
			e.preventDefault()

			const email = document.getElementById("email").value
			const password = document.getElementById("password").value
			const errorDiv = document.getElementById("error-message")
			const submitBtn = this.querySelector('button[type="submit"]')

			// Блокируем кнопку
			submitBtn.disabled = true
			submitBtn.textContent = "Вход..."
			errorDiv.style.display = "none"

			try {
				const response = await fetch("/api/auth/login", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ email, password })
				})

				const data = await response.json()

				if (response.ok && data.user) {
					// Перенаправляем в админку или на главную
					window.location.href = "/admin/dashboard"
				} else {
					throw new Error(data.message || "Ошибка входа")
				}
			} catch (err) {
				errorDiv.textContent = err.message
				errorDiv.style.display = "block"
				submitBtn.disabled = false
				submitBtn.textContent = "Войти"
			}
		})
</script>
{% endblock content %}
