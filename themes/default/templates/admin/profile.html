{% extends "admin/base.html" %}

{% block title %}Мой профиль{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <h1>Профиль пользователя</h1>

    <div class="card">
        <div style="text-align: center; margin-bottom: 20px;">
            <img id="preview-avatar" src="{{ user.avatar_url | default(value='/static/themes/default/images/avatar-placeholder.png') }}"
                 alt="Avatar" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #ddd;">
            <p style="margin-top: 10px; color: #666;">{{ user.role }}</p>
        </div>

        <form id="profile-form">
            <div class="form-group">
                <label>Email (только чтение)</label>
                <input type="email" value="{{ user.email }}" disabled style="background: #f9f9f9; cursor: not-allowed;">
            </div>

            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" value="{{ user.username }}" disabled style="background: #f9f9f9; cursor: not-allowed;">
                <small style="color: #888;">Изменение имени пользователя временно недоступно.</small>
            </div>

            <div class="form-group">
                <label>Отображаемое имя</label>
                <input type="text" id="display_name" name="display_name" value="{{ user.display_name | default(value='') }}" placeholder="Как вас называть?">
            </div>

            <div class="form-group">
                <label>URL аватара</label>
                <input type="url" id="avatar_url" name="avatar_url" value="{{ user.avatar_url | default(value='') }}" placeholder="https://...">
                <small style="color: #888;">Вставьте ссылку на изображение.</small>
            </div>

            <div class="form-group">
                <label>О себе (Био)</label>
                <textarea id="bio" name="bio" rows="4" placeholder="Расскажите немного о себе...">{{ user.bio | default(value='') }}</textarea>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                <button type="button" id="cancel-btn" class="btn" style="background: #95a5a6; color: white;">Отмена</button>
            </div>
        </form>

        <div id="message-box" style="margin-top: 15px; display: none; padding: 10px; border-radius: 4px;"></div>
    </div>
</div>

<script>
// Предпросмотр аватара при изменении URL
document.getElementById('avatar_url').addEventListener('input', function(e) {
    const url = e.target.value;
    const img = document.getElementById('preview-avatar');
    if(url && url.startsWith('http')) {
        img.src = url;
    } else {
        img.src = '/static/themes/default/avatar-placeholder.png';
    }
});

// Отправка формы
document.getElementById('profile-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const btn = this.querySelector('button[type="submit"]');
    const msgBox = document.getElementById('message-box');

    const data = {
        display_name: document.getElementById('display_name').value,
        bio: document.getElementById('bio').value,
        avatar_url: document.getElementById('avatar_url').value
    };

    btn.disabled = true;
    btn.textContent = 'Сохранение...';
    msgBox.style.display = 'none';

    try {
        const res = await fetch('/api/users/me', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok && result.success) {
            msgBox.style.background = '#d4edda';
            msgBox.style.color = '#155724';
            msgBox.textContent = '✅ Профиль успешно обновлен!';
            msgBox.style.display = 'block';

            // Обновляем аватар превью окончательно
            if(data.avatar_url) {
                document.getElementById('preview-avatar').src = data.avatar_url;
            }
        } else {
            throw new Error(result.message || 'Ошибка сохранения');
        }
    } catch (err) {
        msgBox.style.background = '#f8d7da';
        msgBox.style.color = '#721c24';
        msgBox.textContent = '❌ ' + err.message;
        msgBox.style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.textContent = 'Сохранить изменения';
    }
});

// Кнопка отмены (просто перезагружает страницу)
document.getElementById('cancel-btn').addEventListener('click', () => {
    window.location.reload();
});
</script>
{% endblock %}
