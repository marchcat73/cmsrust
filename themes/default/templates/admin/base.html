<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<title>{% block title %}Админ-панель{% endblock %} | CMS Rust</title>
		<link
			rel="stylesheet"
			href="/static/themes/{{ current_theme }}/style.css" />
		<link
			rel="stylesheet"
			href="/static/themes/{{ current_theme }}/admin/base.css" />
	</head>
	<body>
		<div class="admin-layout">
			<!-- Боковое меню -->
			<aside class="sidebar">
				<h2>CMS Rust Admin</h2>
				<div class="user-info">
			    <img id="user-avatar" src="/static/themes/{{ current_theme }}/images/default-avatar.png" alt="Avatar" style="width: 40px; border-radius: 50%;">
			    <div>
			        <strong id="user-display-name">Загрузка...</strong>
			        <div id="user-role" style="font-size: 0.8em; color: #aaa;">Роль</div>
			    </div>
			</div>
				<nav>
					<a href="/admin/users/me">👤 Мой профиль</a>
					<a href="/admin/dashboard">📊 Посты</a>
					<a href="#">📁 Категории</a>
					<a href="#">🏷️ Теги</a>
					<a href="#">👥 Пользователи</a>
					<a
						href="#"
						onclick="logout()"
						>🚪 Выйти</a
					>
				</nav>
				<div style="margin-top: 20px; font-size: 0.8rem; color: #95a5a6">
					Пользователь: {{ user.username }}<br />
					Роль: {{ user.role }}
				</div>
			</aside>

			<!-- Основной контент -->
			<main class="main-content">
				{% block content %}{% endblock %}
			</main>
		</div>

		<script>
			// Функция выхода
			async function logout() {
				await fetch("/api/auth/logout", { method: "POST" })
				window.location.href = "/login"
			}

			// Функция удаления поста (мягкое удаление)
			async function deletePost(id) {
				if (!confirm("Вы уверены? Пост будет перемещен в корзину.")) return

				const res = await fetch(`/api/posts/${id}`, { method: "DELETE" })
				if (res.ok) location.reload()
				else alert("Ошибка при удалении")
			}

			// Функция восстановления поста
			async function restorePost(id) {
				const res = await fetch(`/api/posts/${id}/restore`, { method: "POST" })
				if (res.ok) location.reload()
				else alert("Ошибка при восстановлении")
			}

			// Функция полного удаления (только для админа, опционально)
			async function hardDelete(id) {
				if (
					!confirm(
						"ВНИМАНИЕ: Это удалит пост навсегда без возможности восстановления!"
					)
				)
					return
				// Пока используем тот же эндпоинт, но в реальности нужен отдельный или флаг
				// Для простоты пока оставим мягкое удаление
				deletePost(id)
			}

			async function loadUserProfile() {
			    try {
			        // Куки отправляются браузером автоматически благодаря настройкам CORS и SameSite
			        const response = await fetch('/api/users/me', {
			            method: 'GET',
			            headers: {
			                'Accept': 'application/json'
			            }
			        });

			        if (response.ok) {
			            const data = await response.json();
			            if (data.success) {
			                const user = data.data;
			                // Обновляем интерфейс
			                document.getElementById('user-display-name').textContent = user.display_name || user.username;
			                document.getElementById('user-role').textContent = user.role;
			                if (user.avatar_url) {
			                    document.getElementById('user-avatar').src = user.avatar_url;
			                }
			            }
			        } else {
			            // Если 401 - редирект на логин
			            window.location.href = '/login';
			        }
			    } catch (error) {
			        console.error('Error loading profile:', error);
			    }
			}

			// Вызываем при загрузке страницы админки
			document.addEventListener('DOMContentLoaded', loadUserProfile);
		</script>
		{% block scripts %}{% endblock %}
	</body>
</html>
